# Corrected 32M MultiScale-Branchformer + Hybrid TDT/CTC model.
#
# Inherits the corrected 32M FastConformer hybrid TDT/CTC recipe and swaps only
# the encoder to the multi-scale Branchformer variant.

name: "MultiScale-Branchformer-Hybrid-TDT-CTC-32m-V2"

defaults:
  - fc_hybrid_tdt_ctc_32m_v2

model:
  encoder:
    _target_: nemo.collections.asr.modules.MultiScaleBranchformerEncoder
    feat_in: ${model.preprocessor.features}
    n_layers: 16
    d_model: 256
    subsampling_factor: 8
    subsampling_conv_channels: 256
    ff_expansion_factor: 4
    n_heads: 4
    xscaling: true
    cgmlp_conv_kernel: 31
    cgmlp_expansion_factor: 4
    cgmlp_scale_kernels: [9, 31, 63]
    merge_conv_kernel: 3
    use_linear_after_conv: false
    gate_activation: identity
    use_ffn: true
    macaron_ffn: false

