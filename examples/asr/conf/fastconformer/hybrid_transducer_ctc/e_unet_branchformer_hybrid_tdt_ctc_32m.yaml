# E-UNET-BRANCHFORMER-HYBRID-TDT-CTC
#
# This keeps the working 32M UNet-Branchformer + Hybrid TDT/CTC macro-architecture
# unchanged and upgrades only the Branchformer block internals to a budget-neutral
# E-Branchformer-style configuration:
# - macaron FFN structure enabled
# - FFN expansion reduced from 4x to 2x so total FFN budget stays near constant
# - merge conv widened from 3 to 31
# The U-Net schedule, TDT head, and auxiliary CTC head remain unchanged.

name: "E-UNET-BRANCHFORMER-HYBRID-TDT-CTC"

defaults:
  - fc_hybrid_tdt_ctc_32m_v2

model:
  encoder:
    _target_: nemo.collections.asr.modules.UNetBranchformerEncoder
    feat_in: ${model.preprocessor.features}
    n_layers: 16
    d_model: 256
    subsampling_factor: 8
    subsampling_conv_channels: 256
    ff_expansion_factor: 2
    n_heads: 4
    xscaling: true
    cgmlp_conv_kernel: 31
    cgmlp_expansion_factor: 4
    merge_conv_kernel: 31
    use_linear_after_conv: false
    gate_activation: identity
    use_ffn: true
    macaron_ffn: true
    unet_stage_layers: [4, 8, 4]
    unet_downsample_kernel_size: 3
    unet_upsample_kernel_size: 3
