# Experimental 32M GatedFC-FastConformer + Hybrid TDT/CTC model.
# This keeps the small hybrid decoder/joint dimensions and swaps encoder
# layers 6 and 7 to GatedFC blocks.

name: "GatedFC-Hybrid-TDT-CTC-32m"

defaults:
  - fastconformer_hybrid_tdt_ctc_bpe

model:
  preprocessor:
    features: 80
    log: true
    pad_value: 0.0

  model_defaults:
    enc_hidden: ${model.encoder.d_model}
    pred_hidden: 256
    joint_hidden: 256

  train_ds:
    max_duration: 20

  encoder:
    _target_: nemo.collections.asr.modules.GatedFCConformerEncoder
    feat_in: ${model.preprocessor.features}
    n_layers: 16
    d_model: 256
    subsampling_factor: 8
    subsampling_conv_channels: 256
    ff_expansion_factor: 4
    n_heads: 4
    xscaling: true
    conv_kernel_size: 9
    gated_fc_layer_indices: [5, 6]
    gated_fc_expansion_factor: 4

  decoder:
    prednet:
      pred_hidden: ${model.model_defaults.pred_hidden}
      pred_rnn_layers: 1
      dropout: 0.1

  joint:
    fuse_loss_wer: false
    jointnet:
      joint_hidden: ${model.model_defaults.joint_hidden}
      activation: "relu"
      dropout: 0.1

  aux_ctc:
    ctc_loss_weight: 0.3
