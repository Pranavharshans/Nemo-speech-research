# CIF-style UNet-Branchformer hybrid model.
#
# Keeps the working UNet Branchformer encoder and auxiliary CTC branch, and
# swaps the transducer branch for a differentiable CIF-style token firing path
# plus a lightweight text-only recurrent scan decoder.

name: "CIF-UNet-Branchformer-Hybrid-CE-CTC-32m-V1"

defaults:
  - unet_branchformer_hybrid_tdt_ctc_32m_v2

model:
  experimental_scan_decoder:
    enabled: true
    mode: cif
    hidden_size: 320
    embedding_dim: 256
    dropout: 0.1
    label_smoothing: 0.1
    max_decode_tokens: 192
    cif:
      input_source: stage1
      weight_conv_kernel: 3
      quantity_loss_weight: 1.0
