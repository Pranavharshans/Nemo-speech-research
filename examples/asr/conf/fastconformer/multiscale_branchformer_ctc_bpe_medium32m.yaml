# MultiScale-Branchformer medium CTC model.
#
# This keeps the Branchformer encoder geometry identical to the baseline 32M
# setup and only replaces the single cgMLP depthwise convolution with
# parallel multi-scale depthwise convolutions.

name: "MultiScale-Branchformer-CTC-BPE-Medium-32M"

defaults:
  - fast-conformer_ctc_bpe

model:
  encoder:
    _target_: nemo.collections.asr.modules.MultiScaleBranchformerEncoder
    d_model: 256
    n_heads: 4
    n_layers: 16
    subsampling_conv_channels: 256
    xscaling: true
    cgmlp_conv_kernel: 31
    cgmlp_scale_kernels: [9, 31, 63]
    cgmlp_expansion_factor: 4
    merge_conv_kernel: 3
    use_linear_after_conv: false
    gate_activation: identity
    use_ffn: true
    macaron_ffn: false

  optim:
    weight_decay: 1e-3
