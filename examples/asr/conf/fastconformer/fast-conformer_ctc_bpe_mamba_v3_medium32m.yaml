# Experimental V3 config for the Medium (32M) FastConformer-CTC model with
# a late-stage Mamba span.
#
# Layout (1-based encoder layers):
# - FastConformer: 1 through 9, 15, 16
# - Mamba: 10 through 14

name: "FastConformer-CTC-BPE-Mamba-V3-Medium-32M"

defaults:
  - fast-conformer_ctc_bpe

model:
  encoder:
    _target_: nemo.collections.asr.modules.MambaConformerEncoder
    d_model: 256
    n_heads: 4
    n_layers: 16
    subsampling_conv_channels: 256
    xscaling: true
    # Converted from the requested 1-based layer layout:
    # FC on 1-9, 15, 16 and Mamba on 10-14.
    mamba_layer_indices: [9, 10, 11, 12, 13]
    mamba_expand: 2
    mamba_local_conv_kernel_size: 9

  optim:
    weight_decay: 1e-3
