# Experimental V5 config for the Medium (32M) FastConformer-CTC model with
# a very narrow middle Mamba span.
#
# Layout (1-based encoder layers):
# - FastConformer: 1 through 5, 8 through 16
# - Mamba: 6, 7

name: "FastConformer-CTC-BPE-Mamba-V5-Medium-32M"

defaults:
  - fast-conformer_ctc_bpe

model:
  encoder:
    _target_: nemo.collections.asr.modules.MambaConformerEncoder
    d_model: 256
    n_heads: 4
    n_layers: 16
    subsampling_conv_channels: 256
    xscaling: true
    # Converted from the requested 1-based layer layout:
    # FastConformer on 1-5, 8-16 and Mamba on 6, 7.
    mamba_layer_indices: [5, 6]
    mamba_expand: 2
    mamba_local_conv_kernel_size: 9

  optim:
    weight_decay: 1e-3
